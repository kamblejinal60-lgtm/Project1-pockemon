<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Insect UI</title>

  <link rel="stylesheet" href="style.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>

  <section class="container">

    <div class="left">

      <div class="logo">INSECT</div>

      <div class="classification">
        Classification
      </div>

      <div class="details">

        <div class="item">
          <h3>Class:</h3>
          <p>Insecta</p>
        </div>

        <div class="item">
          <h3>Order:</h3>
          <p>Coleoptera</p>
        </div>

        <div class="item">
          <h3> sub Family:</h3>
          <p>Cerambycidae</p>
        </div>

        <div class="item">
          <h3>tribe:</h3>
          <p>callicromatini</p>
        </div>

        <div class="item">
          <h3>Genus:</h3>
          <p>Pachyteria</p>
        </div>

        


      </div>

    </div>

    </div>
        <img class="glass" src="images/cockroch image.png" alt="Insect">

    <div class="right">

      <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
      </nav>

      <div class="content">

        <h1>Pachyteria equestris</h1>

        <div class="info">

          <div>
            <span>Locality</span>
            <p>Malaysia</p>
          </div>

          <div>
            <span>Sex</span>
            <p>Male</p>
          </div>

          <div>
            <span>Size</span>
            <p>32mm / 12mm</p>
          </div>

        </div>

        <h2>$5.99</h2>

        <button>Add to collection</button>

      </div>

    </div>

  </section>

</body>

</html>
