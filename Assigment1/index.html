<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pikachu Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">

    <!-- LEFT SIDE -->
    <div class="left">

      <img src="pokemon_logo.png" class="logo" alt="Pokemon Logo">

      <div class="content">
        <h4>POKEMON GEN I</h4>

        <h1>Pikachu</h1>
        <p class="text">
          Pikachu is an Electric-type Pokémon introduced
          in Generation I. Pikachu are small, chubby,
          and incredibly cute mouse-like Pokémon.
          They are almost completely covered by yellow fur.
        </p>

        <div class="pagination">
          <span class="line"></span>
          <span>01 / 08</span>
        </div>
      </div>

      <div class="pokeball"></div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

      <div class="menu">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <img src="pikachu.png" class="pikachu" alt="Pikachu">

      <div class="dots">
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

  </section>
